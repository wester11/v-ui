services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: voidwg
      POSTGRES_PASSWORD: voidwg
      POSTGRES_DB: voidwg
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/migrations/001_init.sql:/docker-entrypoint-initdb.d/001_init.sql:ro
      - ./backend/migrations/002_phase4.sql:/docker-entrypoint-initdb.d/002_phase4.sql:ro
      - ./backend/migrations/003_phase5.sql:/docker-entrypoint-initdb.d/003_phase5.sql:ro
      - ./backend/migrations/004_server_config_split.sql:/docker-entrypoint-initdb.d/004_server_config_split.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U voidwg"]
      interval: 5s
      timeout: 3s
      retries: 12

  api:
    build: ./backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      HTTP_ADDR: ":8080"
      DATABASE_DSN: "postgres://voidwg:voidwg@postgres:5432/voidwg?sslmode=disable"
      JWT_SECRET: "${JWT_SECRET:?set in .env}"
      LOG_LEVEL: "${LOG_LEVEL:-info}"
      AGENT_INSECURE_TLS: "${AGENT_INSECURE_TLS:-false}"
      MTLS_DIR: "/var/lib/voidwg/agent-ca"
      PUBLIC_BASE_URL: "${PUBLIC_BASE_URL:-}"
      BOOTSTRAP_ADMIN_EMAIL: "${BOOTSTRAP_ADMIN_EMAIL:-admin@local}"
      BOOTSTRAP_ADMIN_PASSWORD: "${BOOTSTRAP_ADMIN_PASSWORD:?set in .env}"
    volumes:
      - ./runtime/agent-ca:/var/lib/voidwg/agent-ca
    expose:
      - "8080"

  frontend:
    build: ./frontend
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "${PANEL_HTTP_PORT:-80}:80"
      - "${PANEL_HTTPS_PORT:-443}:443"
    volumes:
      - ./runtime/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./runtime/tls:/etc/nginx/tls:ro
      - ./runtime/acme-www:/var/www/acme

  # ===== Agent (WG / AmneziaWG) =====
  # Включить:  docker compose --profile agent up -d agent-1
  agent-1:
    build: ./agent
    profiles: ["agent"]
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
    environment:
      AGENT_PROTOCOL: "${AGENT_PROTOCOL:-amneziawg}"
      CONTROL_URL:    "${CONTROL_URL:-http://api:8080}"
      AGENT_TOKEN:    "${AGENT_1_TOKEN:-}"
      NODE_ID:        "${AGENT_1_NODE_ID:-}"
      SECRET:         "${AGENT_1_SECRET:-}"
      CONTROL_CA:     "${CONTROL_CA:-}"
      CONTROL_CERT:   "${CONTROL_CERT:-}"
      CONTROL_KEY:    "${CONTROL_KEY:-}"
      AGENT_INSECURE_TLS: "${AGENT_INSECURE_TLS:-false}"
      WG_IFACE:    "wg0"
      OBFS_LISTEN: ":51821"
      TCP_LISTEN:  "${AGENT_TCP_LISTEN:-}"
      WG_ADDR:     "127.0.0.1:51820"
      AWG_JC:   "${AWG_JC:-4}"
      AWG_JMIN: "${AWG_JMIN:-50}"
      AWG_JMAX: "${AWG_JMAX:-1000}"
      AWG_S1:   "${AWG_S1:-67}"
      AWG_S2:   "${AWG_S2:-115}"
      AWG_H1:   "${AWG_H1:-1234567}"
      AWG_H2:   "${AWG_H2:-2345678}"
      AWG_H3:   "${AWG_H3:-3456789}"
      AWG_H4:   "${AWG_H4:-4567890}"
    ports:
      - "${WG_PORT:-51820}:51820/udp"
      - "${OBFS_PORT:-51821}:51821/udp"

  # ===== Xray agent =====
  # Включить:  docker compose --profile xray up -d agent-xray xray
  #
  # agent-xray запускает control-loop (HTTP-API + heartbeat) и
  # пишет /etc/xray/config.json во ВНЕШНИЙ volume xray_cfg.
  # Сам xray-core живёт в отдельном контейнере, читает тот же volume.
  agent-xray:
    build: ./agent
    profiles: ["xray"]
    restart: unless-stopped
    environment:
      AGENT_PROTOCOL: "xray"
      CONTROL_URL:    "${CONTROL_URL:-http://api:8080}"
      AGENT_TOKEN:    "${AGENT_X_TOKEN:-}"
      NODE_ID:        "${AGENT_X_NODE_ID:-}"
      SECRET:         "${AGENT_X_SECRET:-}"
      CONTROL_CA:     "${CONTROL_CA:-}"
      CONTROL_CERT:   "${CONTROL_CERT:-}"
      CONTROL_KEY:    "${CONTROL_KEY:-}"
      AGENT_INSECURE_TLS: "${AGENT_INSECURE_TLS:-false}"
      XRAY_CONFIG:    "/etc/xray/config.json"
      XRAY_CONTAINER: "void-wg-xray"
      XRAY_HEALTH:    "127.0.0.1:443"
    volumes:
      - xray_cfg:/etc/xray
      # docker.sock — агент рестартует контейнер xray через `docker restart`.
      # Stateless модель: agent не управляет xray-процессом сам.
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      - xray

  xray:
    image: teddysun/xray:latest
    container_name: void-wg-xray
    profiles: ["xray"]
    restart: unless-stopped
    network_mode: host
    volumes:
      - xray_cfg:/etc/xray:ro
    command: ["run", "-c", "/etc/xray/config.json"]

  prometheus:
    image: prom/prometheus:v2.52.0
    profiles: ["metrics"]
    restart: unless-stopped
    volumes:
      - ./deploy/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    expose:
      - "9090"

volumes:
  pgdata:
  xray_cfg:
