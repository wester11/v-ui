openapi: 3.1.0
info:
  title: Void-WG Control API
  version: 0.1.0
  description: |
    REST API для управления WireGuard VPN: пользователи, серверы (агенты), peer'ы.
    Авторизация — JWT Bearer (HS256). Heartbeat агентов — заголовком `X-Agent-Token`.
servers:
  - url: http://localhost:8080
    description: Local

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    agentToken:
      type: apiKey
      in: header
      name: X-Agent-Token

  schemas:
    Error:
      type: object
      properties:
        error: { type: string }
        code:  { type: string }

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:    { type: string, format: email }
        password: { type: string, format: password, minLength: 8 }

    TokenResponse:
      type: object
      properties:
        access_token:  { type: string }
        refresh_token: { type: string }
        token_type:    { type: string, example: Bearer }
        expires_in:    { type: integer, example: 900 }

    User:
      type: object
      properties:
        id:         { type: string, format: uuid }
        email:      { type: string, format: email }
        role:       { type: string, enum: [admin, operator, user] }
        disabled:   { type: boolean }
        created_at: { type: string, format: date-time }

    CreateUserRequest:
      type: object
      required: [email, password, role]
      properties:
        email:    { type: string, format: email }
        password: { type: string, format: password, minLength: 8 }
        role:     { type: string, enum: [admin, operator, user] }

    Server:
      type: object
      properties:
        id:             { type: string, format: uuid }
        name:           { type: string }
        endpoint:       { type: string, example: "vpn1.example.com:51820" }
        public_key:     { type: string }
        listen_port:    { type: integer }
        subnet:         { type: string, example: "10.10.0.0/24" }
        obfs_enabled:   { type: boolean }
        online:         { type: boolean }
        last_heartbeat: { type: string, format: date-time, nullable: true }

    CreateServerRequest:
      type: object
      required: [name, endpoint, listen_port, subnet]
      properties:
        name:         { type: string }
        endpoint:     { type: string }
        listen_port:  { type: integer, minimum: 1, maximum: 65535 }
        subnet:       { type: string }
        dns:          { type: array, items: { type: string } }
        obfs_enabled: { type: boolean }

    Peer:
      type: object
      properties:
        id:             { type: string, format: uuid }
        user_id:        { type: string, format: uuid }
        server_id:      { type: string, format: uuid }
        name:           { type: string }
        public_key:     { type: string }
        assigned_ip:    { type: string }
        enabled:        { type: boolean }
        bytes_rx:       { type: integer }
        bytes_tx:       { type: integer }
        last_handshake: { type: string, format: date-time, nullable: true }
        created_at:     { type: string, format: date-time }

    CreatePeerRequest:
      type: object
      required: [server_id, name, public_key]
      properties:
        server_id:  { type: string, format: uuid }
        name:       { type: string }
        public_key: { type: string, description: "X25519 public key (base64, 44 chars). Приватник остаётся у клиента." }

    CreatePeerResponse:
      type: object
      properties:
        peer:   { $ref: '#/components/schemas/Peer' }
        config: { type: string, description: "wg-quick stub без PrivateKey — клиент подставит свой приватник" }

    AWGParams:
      type: object
      properties:
        Jc:   { type: integer, minimum: 0, maximum: 255 }
        Jmin: { type: integer }
        Jmax: { type: integer }
        S1:   { type: integer }
        S2:   { type: integer }
        H1:   { type: integer, format: int64 }
        H2:   { type: integer, format: int64 }
        H3:   { type: integer, format: int64 }
        H4:   { type: integer, format: int64 }

    Invite:
      type: object
      properties:
        id:             { type: string, format: uuid }
        token:          { type: string }
        url:            { type: string }
        server_id:      { type: string, format: uuid }
        suggested_name: { type: string }
        expires_at:     { type: string, format: date-time }
        used_at:        { type: string, format: date-time, nullable: true }
        peer_id:        { type: string, format: uuid, nullable: true }

    CreateInviteRequest:
      type: object
      required: [server_id]
      properties:
        server_id:      { type: string, format: uuid }
        suggested_name: { type: string }
        ttl_seconds:    { type: integer, default: 86400 }

    InviteLookupResponse:
      type: object
      properties:
        endpoint:     { type: string }
        public_key:   { type: string }
        listen_port:  { type: integer }
        tcp_port:     { type: integer }
        tls_port:     { type: integer }
        dns:          { type: array, items: { type: string } }
        obfs_enabled: { type: boolean }
        awg:          { $ref: '#/components/schemas/AWGParams' }
        expires_at:   { type: string, format: date-time }
        suggested_name: { type: string }

    RedeemInviteRequest:
      type: object
      required: [public_key]
      properties:
        public_key: { type: string, description: "X25519 public key (base64), сгенерированный клиентом локально" }
        name:       { type: string }

    AuditEntry:
      type: object
      properties:
        id:          { type: integer, format: int64 }
        ts:          { type: string, format: date-time }
        actor_id:    { type: string, format: uuid, nullable: true }
        actor_email: { type: string }
        action:      { type: string }
        target_type: { type: string }
        target_id:   { type: string }
        ip:          { type: string }
        user_agent:  { type: string }
        result:      { type: string, enum: [ok, denied, error] }
        meta:        { type: object, additionalProperties: true }

    Stats:
      type: object
      properties:
        users:           { type: integer }
        peers:           { type: integer }
        servers:         { type: integer }
        servers_online:  { type: integer }
        bytes_rx_total:  { type: integer, format: int64 }
        bytes_tx_total:  { type: integer, format: int64 }

    ChangePasswordRequest:
      type: object
      required: [old_password, new_password]
      properties:
        old_password: { type: string, format: password }
        new_password: { type: string, format: password, minLength: 8 }

paths:
  /healthz:
    get:
      summary: Liveness probe
      security: []
      responses:
        '200': { description: OK }

  /metrics:
    get:
      summary: Prometheus metrics
      security: []
      responses:
        '200': { description: OK }

  /api/v1/auth/login:
    post:
      summary: Login
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/LoginRequest' }
      responses:
        '200':
          description: ok
          content:
            application/json:
              schema: { $ref: '#/components/schemas/TokenResponse' }
        '401':
          description: invalid credentials
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /api/v1/auth/refresh:
    post:
      summary: Exchange refresh token
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                refresh_token: { type: string }
      responses:
        '200':
          description: ok
          content:
            application/json:
              schema: { $ref: '#/components/schemas/TokenResponse' }

  /api/v1/me:
    get:
      summary: Current user profile
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          description: ok
          content:
            application/json:
              schema: { $ref: '#/components/schemas/User' }

  /api/v1/me/password:
    patch:
      summary: Change own password
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ChangePasswordRequest' }
      responses:
        '204': { description: changed }
        '400':
          description: invalid input
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '401':
          description: wrong current password
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /api/v1/stats:
    get:
      summary: Aggregated stats (operator+)
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          description: ok
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Stats' }

  /api/v1/users:
    get:
      summary: List users (operator+)
      security: [{ bearerAuth: [] }]
      parameters:
        - { in: query, name: limit,  schema: { type: integer, default: 50 } }
        - { in: query, name: offset, schema: { type: integer, default: 0 } }
      responses:
        '200':
          description: ok
          content:
            application/json:
              schema: { type: array, items: { $ref: '#/components/schemas/User' } }
    post:
      summary: Create user (operator+)
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateUserRequest' }
      responses:
        '201':
          description: created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/User' }

  /api/v1/users/{id}:
    delete:
      summary: Delete user
      security: [{ bearerAuth: [] }]
      parameters:
        - { in: path, name: id, required: true, schema: { type: string, format: uuid } }
      responses: { '204': { description: deleted } }

  /api/v1/servers:
    get:
      summary: List servers
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          description: ok
          content:
            application/json:
              schema: { type: array, items: { $ref: '#/components/schemas/Server' } }
    post:
      summary: Register server
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateServerRequest' }
      responses:
        '201':
          description: created
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Server'
                  - type: object
                    properties:
                      agent_token: { type: string, description: "Сохранить — больше не отдаётся" }

  /api/v1/servers/{id}:
    delete:
      summary: Remove server
      security: [{ bearerAuth: [] }]
      parameters:
        - { in: path, name: id, required: true, schema: { type: string, format: uuid } }
      responses: { '204': { description: deleted } }

  /api/v1/peers:
    get:
      summary: List my peers
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          description: ok
          content:
            application/json:
              schema: { type: array, items: { $ref: '#/components/schemas/Peer' } }
    post:
      summary: Create peer (provision)
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreatePeerRequest' }
      responses:
        '201':
          description: created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/CreatePeerResponse' }

  /api/v1/peers/{id}:
    delete:
      summary: Revoke peer
      security: [{ bearerAuth: [] }]
      parameters:
        - { in: path, name: id, required: true, schema: { type: string, format: uuid } }
      responses: { '204': { description: revoked } }

  /api/v1/admin/invites:
    post:
      summary: Create one-time invite (operator+)
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateInviteRequest' }
      responses:
        '201':
          description: created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Invite' }
    get:
      summary: List my invites
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          description: ok
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/Invite' }

  /api/v1/admin/invites/{id}:
    delete:
      summary: Revoke invite
      security: [{ bearerAuth: [] }]
      parameters:
        - { in: path, name: id, required: true, schema: { type: string, format: uuid } }
      responses: { '204': { description: revoked } }

  /api/v1/invites/{token}:
    get:
      summary: Lookup invite metadata (no auth — public client-side keygen flow)
      security: []
      parameters:
        - { in: path, name: token, required: true, schema: { type: string } }
      responses:
        '200':
          description: ok
          content:
            application/json:
              schema: { $ref: '#/components/schemas/InviteLookupResponse' }
        '404': { description: not found or expired }

  /api/v1/invites/{token}/redeem:
    post:
      summary: Redeem invite with client-generated public_key
      security: []
      parameters:
        - { in: path, name: token, required: true, schema: { type: string } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/RedeemInviteRequest' }
      responses:
        '200':
          description: peer created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/CreatePeerResponse' }

  /api/v1/audit:
    get:
      summary: Audit log (admin only)
      security: [{ bearerAuth: [] }]
      parameters:
        - { in: query, name: limit,  schema: { type: integer, default: 100 } }
        - { in: query, name: before, schema: { type: integer, format: int64, description: "Cursor: id <" } }
      responses:
        '200':
          description: ok
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/AuditEntry' }

  /api/v1/peers/{id}/config:
    get:
      summary: Download wg-quick .conf
      security: [{ bearerAuth: [] }]
      parameters:
        - { in: path, name: id, required: true, schema: { type: string, format: uuid } }
      responses:
        '200':
          description: ok
          content:
            text/plain:
              schema: { type: string }

  /api/v1/agent/heartbeat:
    post:
      summary: Agent heartbeat (token-only)
      security: [{ agentToken: [] }]
      responses:
        '200':
          description: ok
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Server' }

security:
  - bearerAuth: []
