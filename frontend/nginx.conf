# DEPRECATED: используется только для backward-compat. Активный конфиг —
# frontend/nginx.http.conf (default в Dockerfile) или runtime/nginx.conf
# (bind-mount, который генерирует install.sh для HTTPS-режимов).
server {
    listen 80 default_server;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    client_max_body_size 1m;

    location /.well-known/acme-challenge/ {
        root /var/www/acme;
    }

    location /api/ {
        proxy_pass http://api:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 60s;
    }

    location = /healthz {
        proxy_pass http://api:8080/healthz;
        access_log off;
    }

    location = /metrics {
        allow 127.0.0.1;
        allow 10.0.0.0/8;
        allow 172.16.0.0/12;
        allow 192.168.0.0/16;
        deny all;
        proxy_pass http://api:8080/metrics;
    }

    location / {
        try_files $uri /index.html;
    }
}
