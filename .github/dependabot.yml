version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    target-branch: "main"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "04:00"
      timezone: "Europe/Moscow"
    open-pull-requests-limit: 2
    commit-message:
      prefix: "chore(deps)"
    groups:
      github-actions:
        patterns:
          - "*"

  - package-ecosystem: "gomod"
    directory: "/backend"
    target-branch: "main"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "04:00"
      timezone: "Europe/Moscow"
    open-pull-requests-limit: 2
    commit-message:
      prefix: "chore(deps)"
    groups:
      backend-go:
        patterns:
          - "*"

  - package-ecosystem: "gomod"
    directory: "/agent"
    target-branch: "main"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "04:00"
      timezone: "Europe/Moscow"
    open-pull-requests-limit: 2
    commit-message:
      prefix: "chore(deps)"
    groups:
      agent-go:
        patterns:
          - "*"

  - package-ecosystem: "npm"
    directory: "/frontend"
    target-branch: "main"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "04:00"
      timezone: "Europe/Moscow"
    open-pull-requests-limit: 2
    commit-message:
      prefix: "chore(deps)"
    groups:
      frontend-npm:
        patterns:
          - "*"

  - package-ecosystem: "docker"
    directory: "/"
    target-branch: "main"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "04:00"
      timezone: "Europe/Moscow"
    open-pull-requests-limit: 2
    commit-message:
      prefix: "chore(deps)"
    groups:
      docker-base:
        patterns:
          - "*"
