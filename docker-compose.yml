services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: voidwg
      POSTGRES_PASSWORD: voidwg
      POSTGRES_DB: voidwg
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/migrations/001_init.sql:/docker-entrypoint-initdb.d/001_init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U voidwg"]
      interval: 5s
      timeout: 3s
      retries: 12

  api:
    build: ./backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      HTTP_ADDR: ":8080"
      DATABASE_DSN: "postgres://voidwg:voidwg@postgres:5432/voidwg?sslmode=disable"
      JWT_SECRET: "${JWT_SECRET:?set in .env}"
      SECRETBOX_KEY: "${SECRETBOX_KEY:?set in .env}"
      LOG_LEVEL: "${LOG_LEVEL:-info}"
      AGENT_INSECURE_TLS: "${AGENT_INSECURE_TLS:-true}"
      BOOTSTRAP_ADMIN_EMAIL: "${BOOTSTRAP_ADMIN_EMAIL:-admin@local}"
      BOOTSTRAP_ADMIN_PASSWORD: "${BOOTSTRAP_ADMIN_PASSWORD:?set in .env}"
    expose:
      - "8080"

  frontend:
    build: ./frontend
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "${PANEL_HTTP_PORT:-80}:80"
      - "${PANEL_HTTPS_PORT:-443}:443"
    volumes:
      # install.sh кладёт сюда nginx.conf под выбранный TLS-режим и сертификаты.
      # Если runtime/* отсутствует — nginx использует встроенный HTTP-only конфиг.
      - ./runtime/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./runtime/tls:/etc/nginx/tls:ro
      - ./runtime/acme-www:/var/www/acme

  # Local agent. Disabled by default — needs agent_token from UI first.
  # Enable with:  docker compose --profile agent up -d agent-1
  agent-1:
    build: ./agent
    profiles: ["agent"]
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
    environment:
      CONTROL_URL: "http://api:8080"
      AGENT_TOKEN: "${AGENT_1_TOKEN:-}"
      WG_IFACE: "wg0"
      OBFS_PSK: "${OBFS_PSK:?set in .env}"
      OBFS_LISTEN: ":51821"
      WG_ADDR: "127.0.0.1:51820"
    ports:
      - "${WG_PORT:-51820}:51820/udp"
      - "${OBFS_PORT:-51821}:51821/udp"

  prometheus:
    image: prom/prometheus:v2.52.0
    profiles:
      - metrics
    restart: unless-stopped
    volumes:
      - ./deploy/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    expose:
      - "9090"

volumes:
  pgdata:
